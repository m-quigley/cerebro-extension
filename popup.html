<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Cerebro</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Cerebro</h1>
      <span class="subtitle">push notifications</span>
    </header>

    <section class="panel">
      <header>
        <span class="panel-label">Status</span>
        <span id="statusBadge" class="panel-status off">Idle</span>
      </header>
      <div class="panel-body">
        <div id="status" class="status-text">Loading…</div>
      </div>
    </section>

    <div id="actions">
      <button id="signin" class="primary" hidden>Open Cerebro to sign in</button>
      <button id="subscribe" class="primary" hidden>Subscribe to notifications</button>
      <button id="unsubscribe" class="secondary" hidden>Unsubscribe</button>
    </div>

    <footer>
      <a href="https://www.zeroknowledge.fr" target="_blank" rel="noreferrer noopener"
        >www.zeroknowledge.fr</a
      >
      <span class="version">v0.2.5</span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
